<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Lee testimonios reales de personas que han transformado sus vidas con las terapias y sesiones de yoga de Paola Bergmann."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../images/Logo.jpg" />

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/testimonio.css" />

    <title>Testimonios - YogAmarte</title>
  </head>
  <body data-page="testimonio">
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <section class="testimonios-header">
      <div class="header-container">
        <h1 class="main-title">Historias que Inspiran Confianza</h1>
        <p class="main-subtitle">
          Experiencias reales de transformación y sanación
        </p>
      </div>
    </section>

    <!-- ==================== TESTIMONIOS ==================== -->
    <section class="testimonios-section" id="testimonios">
      <div class="testimonios-container">
        <div class="testimonios-lang-wrap">
          <div class="lang-tabs-testimonio" id="langTabsTestimonio"></div>
        </div>

        <!-- Cuadrícula de testimonios (se genera desde js/testimonios-data.js) -->
        <div class="testimonios-grid" id="testimoniosGrid"></div>
      </div>
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="../js/nav.js"></script>
    <script src="../js/load-navbar.js"></script>
    <script src="../js/load-footer.js"></script>
    <script src="../js/funciones.js"></script>
    <script src="../js/testimonios-data.js"></script>
    <script src="../js/testimonios-grid.js"></script>
    <script src="../js/traduccion.js"></script>
    <script src="../js/copy-clipboard.js"></script>
  </body>
</html>
